<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Contactos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f8fafc; }
    .shell{ max-width:1100px; margin:40px auto; padding:0 15px; }
    .panel{ background:#fff; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.05); overflow:hidden; }
    .panel-header{ padding:20px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; gap:16px; }
    .panel-body{ padding:20px; }
    .panel-footer{ padding:15px 20px; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
    .avatar{ width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid #cbd5e1; }
    .meta{ font-size:.9rem; color:#64748b; }
  </style>
</head>
<body>
<div class="shell">
  <div class="panel">
    <div class="panel-header">
      <div>
        <h5 class="mb-0">Lista de contactos</h5>
        <small class="text-muted">Filtra, revisa y administra tus registros.</small>
      </div>
      <a class="btn btn-dark" th:href="@{/Home/Formulario}">Nuevo contacto</a>
    </div>

    <div class="panel-body">
      <div th:if="${ok}" class="alert alert-success" th:text="${ok}"></div>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form class="row g-2 mb-3" th:action="@{/Home/Lista}" method="get">
        <input type="hidden" name="size" th:value="${size}"/>

        <div class="col-md-3">
          <input class="form-control" name="nombre" th:value="${nombre}" maxlength="80" placeholder="Nombre">
        </div>
        <div class="col-md-3">
          <input class="form-control" name="correo" th:value="${correo}" maxlength="120" placeholder="Correo">
        </div>
        <div class="col-md-2">
          <input class="form-control" name="telefono" th:value="${telefono}" maxlength="10" inputmode="numeric" placeholder="Teléfono">
        </div>
        <div class="col-md-2">
          <input class="form-control" name="cp" th:value="${cp}" maxlength="5" inputmode="numeric" placeholder="C.P.">
        </div>
        <div class="col-md-2">
          <input class="form-control" type="date" name="fecha" th:value="${fecha}">
        </div>

        <div class="col-12 mt-2 d-flex gap-2 flex-wrap">
          <button class="btn btn-dark" type="submit">Buscar</button>
          <a class="btn btn-outline-secondary" th:href="@{/Home/Lista(size=${size})}">Limpiar</a>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
          <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>C.P.</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${contactos.totalElements == 0}">
            <td colspan="8" class="text-center py-4 text-muted">No hay contactos registrados.</td>
          </tr>

          <tr th:each="c : ${contactos.content}">
            <td>
              <img th:if="${c.fotoBase64 != null}" th:src="'data:image/*;base64,' + ${c.fotoBase64}" class="avatar" alt="Foto">
              <span th:if="${c.fotoBase64 == null}" class="text-muted">—</span>
            </td>
            <td th:text="${c.nombre}"></td>
            <td th:text="${c.apellidos}"></td>
            <td th:text="${c.correo}"></td>
            <td th:text="${c.telefono}"></td>
            <td th:text="${c.cp}"></td>
            <td th:text="${c.fechaNacimiento}"></td>
            <td>
              <div class="d-flex gap-2 flex-wrap">
                <a class="btn btn-sm btn-outline-dark" th:href="@{/Home/Formulario/{id}(id=${c.id})}">Editar</a>
                <form th:action="@{/Home/Eliminar/{id}(id=${c.id})}" method="post" style="display:inline;" onsubmit="return confirm('¿Seguro que deseas eliminar este contacto?');">
                  <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel-footer">
      <div class="meta">
        Total: <span th:text="${contactos.totalElements}"></span>
        | Página <span th:text="${contactos.number + 1}"></span>
        de <span th:text="${contactos.totalPages == 0 ? 1 : contactos.totalPages}"></span>
      </div>

      <nav th:if="${contactos.totalPages > 1}">
        <ul class="pagination mb-0">
          <li class="page-item" th:classappend="${contactos.first} ? 'disabled'">
            <a class="page-link" th:href="@{/Home/Lista(page=0,size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">«</a>
          </li>
          <li class="page-item" th:classappend="${contactos.first} ? 'disabled'">
            <a class="page-link" th:href="@{/Home/Lista(page=${contactos.number - 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">‹</a>
          </li>
          <li class="page-item" th:each="i : ${#numbers.sequence(0, contactos.totalPages - 1)}" th:classappend="${i == contactos.number} ? 'active'">
            <a class="page-link" th:text="${i + 1}" th:href="@{/Home/Lista(page=${i},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}"></a>
          </li>
          <li class="page-item" th:classappend="${contactos.last} ? 'disabled'">
            <a class="page-link" th:href="@{/Home/Lista(page=${contactos.number + 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">›</a>
          </li>
          <li class="page-item" th:classappend="${contactos.last} ? 'disabled'">
            <a class="page-link" th:href="@{/Home/Lista(page=${contactos.totalPages - 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">»</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('input[name="telefono"], input[name="cp"]').forEach((input) => {
    const max = input.name === 'telefono' ? 10 : 5;
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '').slice(0, max);
    });
  });
</script>
</body>
</html>
