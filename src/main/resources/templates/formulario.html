<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Formulario</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --paper:#ffffff;
      --bg:#f8fafc;
      --focus:rgba(15,23,42,.10);
      --radius:14px;
    }

    body{
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing: .2px;
    }

    .shell{
      max-width: 980px;
      margin: 0 auto;
      padding: 42px 16px;
    }

    .panel{
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(2,6,23,.06);
      overflow: hidden;
    }

    .panel-header{
      padding: 22px 22px 16px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .title-wrap h1{
      font-size: 1.2rem;
      margin: 0;
      font-weight: 700;
    }

    .title-wrap p{
      margin: 6px 0 0 0;
      font-size: .92rem;
      color: var(--muted);
    }

    .panel-body{
      padding: 22px;
    }

    .form-label{
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-control{
      border-radius: 12px;
      border-color: var(--line);
      padding: 10px 12px;
      background: #fff;
    }

    .form-control:focus{
      border-color: var(--ink);
      box-shadow: 0 0 0 .25rem var(--focus);
    }

    .help-error{
      margin-top: 6px;
      font-size: .85rem;
      min-height: 20px;
    }

    .divider{
      height: 1px;
      background: var(--line);
      margin: 18px 0;
    }

    .actions{
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      padding-top: 6px;
    }

    .btn-min{
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 650;
      letter-spacing: .2px;
    }

    .btn-ghost{
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
    }

    .btn-ghost:hover{
      border-color: var(--ink);
      background: rgba(15,23,42,.03);
    }

    .btn-solid{
      background: var(--ink);
      border: 1px solid var(--ink);
      color: #fff;
      min-width: 180px;
    }

    .btn-solid:hover{
      opacity: .92;
    }

    .preview-img{
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: block;
      margin-top: 8px;
    }

    @media (max-width: 576px){
      .panel-header{
        flex-direction: column;
        align-items: stretch;
      }
      .actions{
        flex-direction: column-reverse;
        align-items: stretch;
      }
      .btn-solid{
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="panel">
      <div class="panel-header">
        <div class="title-wrap">
          <h1 th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Nuevo contacto</h1>
          <p>Captura la información básica y guarda el registro.</p>
        </div>

        <a class="btn btn-min btn-ghost" th:href="@{/Home/Lista}">Ver lista</a>
      </div>

      <div class="panel-body">

        <div
          id="generalError"
          class="alert alert-danger"
          role="alert"
          th:if="${errorGeneral}"
          th:text="${errorGeneral}">
        </div>

        <form id="contactoForm"
              th:action="@{/Home/Guardar}"
              th:attr="data-api-url=@{/Home/GuardarApi}"
              method="post"
              enctype="multipart/form-data"
              th:object="${contacto}">

          <input type="hidden" th:field="*{id}" />

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="nombre">Nombre</label>
              <input
                id="nombre"
                class="form-control"
                th:field="*{nombre}"
                placeholder="Ej. Juan"
                maxlength="60"
                minlength="2"
                required
                autocomplete="given-name"
                pattern="[A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]{2,60}">
              <div class="text-danger help-error field-error" data-error-for="nombre" th:errors="*{nombre}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="apellidos">Apellidos</label>
              <input
                id="apellidos"
                class="form-control"
                th:field="*{apellidos}"
                placeholder="Ej. Pérez López"
                maxlength="80"
                minlength="2"
                required
                autocomplete="family-name"
                pattern="[A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]{2,80}">
              <div class="text-danger help-error field-error" data-error-for="apellidos" th:errors="*{apellidos}"></div>
            </div>

            <div class="col-12">
              <label class="form-label" for="correo">Correo electrónico</label>
              <input
                id="correo"
                class="form-control"
                th:field="*{correo}"
                type="email"
                placeholder="correo@ejemplo.com"
                maxlength="120"
                required
                autocomplete="email">
              <div class="text-danger help-error field-error" data-error-for="correo" th:errors="*{correo}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="telefono">Teléfono (10 dígitos)</label>
              <input
                id="telefono"
                class="form-control"
                th:field="*{telefono}"
                type="tel"
                placeholder="7711234567"
                inputmode="numeric"
                maxlength="10"
                required
                pattern="[0-9]{10}">
              <div class="text-danger help-error field-error" data-error-for="telefono" th:errors="*{telefono}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="cp">Código postal</label>
              <input
                id="cp"
                class="form-control"
                th:field="*{cp}"
                type="text"
                placeholder="43990"
                inputmode="numeric"
                maxlength="5"
                required
                pattern="[0-9]{5}">
              <div class="text-danger help-error field-error" data-error-for="cp" th:errors="*{cp}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="fechaNacimiento">Fecha de nacimiento</label>
              <input
                id="fechaNacimiento"
                class="form-control"
                type="date"
                th:field="*{fechaNacimiento}">
              <div class="text-danger help-error field-error" data-error-for="fechaNacimiento"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="foto">Foto de perfil (opcional)</label>
              <input
                id="foto"
                class="form-control"
                type="file"
                name="foto"
                accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp">
              <div class="text-danger help-error field-error" data-error-for="foto"></div>

              <div th:if="${contacto.fotoActualBase64 != null}">
                <small class="text-muted">Foto actual:</small>
                <img
                  class="preview-img"
                  th:src="'data:image/*;base64,' + ${contacto.fotoActualBase64}"
                  alt="Foto actual">
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="actions">
            <a class="btn btn-min btn-ghost" th:href="@{/Home/Lista}">Cancelar</a>
            <button id="btnGuardar" class="btn btn-min btn-solid" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const form = document.getElementById('contactoForm');
      if (!form) return;

      const inputNombre = document.getElementById('nombre');
      const inputApellidos = document.getElementById('apellidos');
      const inputCorreo = document.getElementById('correo');
      const inputTelefono = document.getElementById('telefono');
      const inputCp = document.getElementById('cp');
      const inputFecha = document.getElementById('fechaNacimiento');
      const inputFoto = document.getElementById('foto');
      const btnGuardar = document.getElementById('btnGuardar');

      const hoy = new Date().toISOString().split('T')[0];
      if (inputFecha) inputFecha.max = hoy;

      function setError(field, message) {
        const el = form.querySelector(`[data-error-for="${field}"]`);
        if (el) el.textContent = message || '';
      }

      function clearErrors() {
        form.querySelectorAll('.field-error').forEach(el => el.textContent = '');
        let generalError = document.getElementById('generalError');
        if (generalError && !generalError.hasAttribute('th:if')) {
          generalError.textContent = '';
          generalError.classList.add('d-none');
        }
      }

      function showGeneralError(message) {
        let generalError = document.getElementById('generalError');
        if (!generalError) {
          generalError = document.createElement('div');
          generalError.id = 'generalError';
          generalError.className = 'alert alert-danger';
          generalError.setAttribute('role', 'alert');
          form.parentNode.insertBefore(generalError, form);
        }
        generalError.textContent = message;
        generalError.classList.remove('d-none');
      }

      function normalizarTexto(input, max) {
        input.value = input.value
          .replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]/g, '')
          .replace(/\s{2,}/g, ' ')
          .replace(/^\s+/, '')
          .slice(0, max);
      }

      function soloDigitos(input, max) {
        input.value = input.value.replace(/\D/g, '').slice(0, max);
      }

      inputNombre?.addEventListener('input', () => normalizarTexto(inputNombre, 60));
      inputApellidos?.addEventListener('input', () => normalizarTexto(inputApellidos, 80));
      inputTelefono?.addEventListener('input', () => soloDigitos(inputTelefono, 10));
      inputCp?.addEventListener('input', () => soloDigitos(inputCp, 5));
      inputCorreo?.addEventListener('blur', () => {
        inputCorreo.value = inputCorreo.value.trim().toLowerCase();
      });

      function validarFotoCliente() {
        if (!inputFoto || !inputFoto.files || inputFoto.files.length === 0) {
          setError('foto', '');
          return true;
        }

        const file = inputFoto.files[0];
        const tiposPermitidos = ['image/jpeg', 'image/png', 'image/webp'];
        const maxBytes = 2 * 1024 * 1024;

        if (!tiposPermitidos.includes(file.type)) {
          setError('foto', 'La foto debe ser JPG, PNG o WEBP.');
          inputFoto.value = '';
          return false;
        }

        if (file.size > maxBytes) {
          setError('foto', 'La foto no debe exceder 2 MB.');
          inputFoto.value = '';
          return false;
        }

        setError('foto', '');
        return true;
      }

      inputFoto?.addEventListener('change', validarFotoCliente);

      function validarCliente() {
        clearErrors();

        let valido = true;

        const nombre = inputNombre.value.trim().replace(/\s+/g, ' ');
        const apellidos = inputApellidos.value.trim().replace(/\s+/g, ' ');
        const correo = inputCorreo.value.trim().toLowerCase();
        const telefono = inputTelefono.value.trim();
        const cp = inputCp.value.trim();
        const fecha = inputFecha?.value || '';

        const regexNombre = /^[A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]{2,60}$/;
        const regexApellidos = /^[A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]{2,80}$/;
        const regexCorreo = /^[^\s@<>]+@[^\s@<>]+\.[^\s@<>]+$/;
        const regexTelefono = /^[0-9]{10}$/;
        const regexCp = /^[0-9]{5}$/;

        if (!regexNombre.test(nombre)) {
          setError('nombre', 'Escribe un nombre válido.');
          valido = false;
        } else {
          inputNombre.value = nombre;
        }

        if (!regexApellidos.test(apellidos)) {
          setError('apellidos', 'Escribe apellidos válidos.');
          valido = false;
        } else {
          inputApellidos.value = apellidos;
        }

        if (!regexCorreo.test(correo)) {
          setError('correo', 'Escribe un correo válido.');
          valido = false;
        } else {
          inputCorreo.value = correo;
        }

        if (!regexTelefono.test(telefono)) {
          setError('telefono', 'El teléfono debe tener 10 dígitos.');
          valido = false;
        }

        if (!regexCp.test(cp)) {
          setError('cp', 'El código postal debe tener 5 dígitos.');
          valido = false;
        }

        if (fecha && fecha > hoy) {
          setError('fechaNacimiento', 'La fecha no puede ser futura.');
          valido = false;
        }

        if (!validarFotoCliente()) {
          valido = false;
        }

        return valido;
      }

      form.addEventListener('submit', async (e) => {
        if (!window.fetch || !window.FormData) {
          return;
        }

        e.preventDefault();

        if (!validarCliente()) {
          return;
        }

        btnGuardar.disabled = true;

        try {
          const response = await fetch(form.dataset.apiUrl, {
            method: 'POST',
            body: new FormData(form),
            headers: {
              'X-Requested-With': 'XMLHttpRequest'
            }
          });

          const data = await response.json().catch(() => null);

          if (response.ok && data && data.ok) {
            window.location.href = data.redirectUrl || '/Home/Lista';
            return;
          }

          if (data && data.errors) {
            Object.entries(data.errors).forEach(([field, message]) => {
              setError(field, String(message));
            });
          }

          if (data && data.generalError) {
            showGeneralError(data.generalError);
          }

          if (!data) {
            showGeneralError('El servidor no respondió con un formato válido.');
          }

        } catch (error) {
          showGeneralError('Error de conexión al enviar el formulario.');
        } finally {
          btnGuardar.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
