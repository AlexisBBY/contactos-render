<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo Contacto</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Minimal / Formal style -->
  <style>
    :root{
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --paper:#ffffff;
      --bg:#f8fafc;
      --focus:rgba(15,23,42,.10);
      --radius:14px;
    }

    body{
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      letter-spacing: .2px;
    }

    .shell{
      max-width: 980px;
      margin: 0 auto;
      padding: 42px 16px;
    }

    .panel{
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(2,6,23,.06);
      overflow: hidden;
    }

    .panel-header{
      padding: 22px 22px 16px 22px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .title-wrap h1{
      font-size: 1.2rem;
      margin: 0;
      font-weight: 700;
    }

    .title-wrap p{
      margin: 6px 0 0 0;
      font-size: .92rem;
      color: var(--muted);
    }

    .panel-body{
      padding: 22px;
    }

    /* Form */
    .form-label{
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .form-control{
      border-radius: 12px;
      border-color: var(--line);
      padding: 10px 12px;
      background: #fff;
    }

    .form-control:focus{
      border-color: var(--ink);
      box-shadow: 0 0 0 .25rem var(--focus);
    }

    .help-error{
      margin-top: 6px;
      font-size: .85rem;
    }

    .divider{
      height: 1px;
      background: var(--line);
      margin: 18px 0;
    }

    .actions{
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      padding-top: 6px;
    }

    .btn-min{
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 650;
      letter-spacing: .2px;
    }

    .btn-ghost{
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
    }

    .btn-ghost:hover{
      border-color: var(--ink);
      background: rgba(15,23,42,.03);
    }

    .btn-solid{
      background: var(--ink);
      border: 1px solid var(--ink);
      color: #fff;
      min-width: 180px;
    }

    .btn-solid:hover{
      opacity: .92;
    }

    /* Small tweaks */
    @media (max-width: 576px){
      .panel-header{
        flex-direction: column;
        align-items: stretch;
      }
      .actions{
        flex-direction: column-reverse;
        align-items: stretch;
      }
      .btn-solid{
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="shell">

    <div class="panel">
      <div class="panel-header">
        <div class="title-wrap">
          <h1>Nuevo contacto</h1>
          <p>Captura la información básica y guarda el registro.</p>
        </div>

        <a class="btn btn-min btn-ghost" th:href="@{/Home/Lista}">Ver lista</a>
      </div>

      <div class="panel-body">
        <form th:action="@{/Home/Guardar}"
              method="post"
              enctype="multipart/form-data"
              th:object="${contacto}">

          <input type="hidden" th:field="*{id}"/>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre</label>
              <input class="form-control" th:field="*{nombre}" placeholder="Ej. Juan">
              <div class="text-danger help-error" th:errors="*{nombre}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Apellidos</label>
              <input class="form-control" th:field="*{apellidos}" placeholder="Ej. Pérez López">
              <div class="text-danger help-error" th:errors="*{apellidos}"></div>
            </div>

            <div class="col-12">
              <label class="form-label">Correo electrónico</label>
              <input class="form-control" th:field="*{correo}" placeholder="correo@ejemplo.com">
              <div class="text-danger help-error" th:errors="*{correo}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Teléfono (10 dígitos)</label>
              <input class="form-control" th:field="*{telefono}" placeholder="Ej. 7711234567">
              <div class="text-danger help-error" th:errors="*{telefono}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Código postal</label>
              <input class="form-control" th:field="*{cp}" placeholder="Ej. 43990">
              <div class="text-danger help-error" th:errors="*{cp}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Fecha de nacimiento</label>
              <input class="form-control" type="date" th:field="*{fechaNacimiento}">
            </div>

            <div class="col-md-6">
              <label class="form-label">Foto de perfil (opcional)</label>
              <input class="form-control" type="file" name="foto" accept="image/*">
            </div>
          </div>

          <div class="divider"></div>

          <div class="actions">
            <a class="btn btn-min btn-ghost" th:href="@{/Home/Lista}">Cancelar</a>
            <button class="btn btn-min btn-solid" type="submit">Guardar</button>
          </div>

        </form>
      </div>
    </div>

  </div>
</body>
</html>
