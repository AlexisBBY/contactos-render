<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Nuevo contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Nuevo contacto</h1>
    <form th:action="@{/Home/Guardar}" th:object="${contacto}" method="post" enctype="multipart/form-data">
      <input type="hidden" th:field="*{id}">
      
      <!-- Nombre -->
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
      </div>

      <!-- Apellidos -->
      <div class="form-group">
        <label for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" th:field="*{apellidos}" class="form-control" required>
      </div>

      <!-- Correo -->
      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" th:field="*{correo}" class="form-control" required>
      </div>

      <!-- Teléfono -->
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" th:field="*{telefono}" class="form-control" required>
      </div>

      <!-- Código Postal -->
      <div class="form-group">
        <label for="cp">Código Postal</label>
        <input type="text" id="cp" th:field="*{cp}" class="form-control" required>
      </div>

      <!-- Fecha de nacimiento -->
      <div class="form-group">
        <label for="fechaNacimiento">Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}" class="form-control">
      </div>

      <!-- Foto de perfil -->
      <div class="form-group">
        <label for="foto">Foto de perfil</label>
        <input type="file" id="foto" name="foto" class="form-control">
      </div>

      <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
  </div>
</body>
</html>
