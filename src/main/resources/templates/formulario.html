<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Nuevo contacto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --radius:16px;
    }
    body{ background:var(--bg); color:var(--ink); }
    .shell{ max-width:900px; margin:40px auto; padding:0 16px; }
    .panel{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:0 18px 40px rgba(15,23,42,.06); overflow:hidden; }
    .panel-header{ padding:22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:16px; align-items:center; }
    .panel-body{ padding:22px; }
    .panel-header h1{ font-size:1.4rem; margin:0; }
    .panel-header p{ margin:4px 0 0; color:var(--muted); }
    .actions{ display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; margin-top:22px; }
    .help-error{ font-size:.88rem; margin-top:6px; }
    .preview{ width:96px; height:96px; border-radius:50%; object-fit:cover; border:1px solid var(--line); }
    .status-box{ display:none; margin-bottom:16px; }
    .status-box.show{ display:block; }
    .loading{ opacity:.7; pointer-events:none; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="panel-header">
        <div>
          <h1 th:text="${contacto.id != null} ? 'Editar contacto' : 'Nuevo contacto'">Nuevo contacto</h1>
          <p>El formulario funciona con y sin JavaScript. Con JavaScript activo usa fetch API.</p>
        </div>
        <a class="btn btn-outline-dark" th:href="@{/Home/Lista}">Ver lista</a>
      </div>

      <div class="panel-body">
        <div id="statusBox" class="alert status-box" role="alert"></div>

        <div th:if="${errorGeneral}" class="alert alert-danger" th:text="${errorGeneral}"></div>

        <form id="contactoForm"
              th:action="@{/Home/Guardar}"
              method="post"
              enctype="multipart/form-data"
              th:object="${contacto}">

          <input type="hidden" th:field="*{id}" />

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="nombre">Nombre</label>
              <input id="nombre" class="form-control" th:field="*{nombre}" maxlength="80" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñÜü' -]+$" required>
              <div class="text-danger help-error" data-error="nombre" th:errors="*{nombre}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="apellidos">Apellidos</label>
              <input id="apellidos" class="form-control" th:field="*{apellidos}" maxlength="120" pattern="^[A-Za-zÁÉÍÓÚáéíóúÑñÜü' -]+$" required>
              <div class="text-danger help-error" data-error="apellidos" th:errors="*{apellidos}"></div>
            </div>

            <div class="col-12">
              <label class="form-label" for="correo">Correo electrónico</label>
              <input id="correo" class="form-control" type="email" th:field="*{correo}" maxlength="120" inputmode="email" required>
              <div class="text-danger help-error" data-error="correo" th:errors="*{correo}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="telefono">Teléfono</label>
              <input id="telefono" class="form-control" th:field="*{telefono}" maxlength="10" minlength="10" inputmode="numeric" pattern="^[0-9]{10}$" required>
              <div class="form-text">Solo 10 dígitos.</div>
              <div class="text-danger help-error" data-error="telefono" th:errors="*{telefono}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="cp">Código postal</label>
              <input id="cp" class="form-control" th:field="*{cp}" maxlength="5" minlength="5" inputmode="numeric" pattern="^[0-9]{5}$" required>
              <div class="form-text">Solo 5 dígitos.</div>
              <div class="text-danger help-error" data-error="cp" th:errors="*{cp}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="fechaNacimiento">Fecha de nacimiento</label>
              <input id="fechaNacimiento" class="form-control" type="date" th:field="*{fechaNacimiento}" max="9999-12-31">
              <div class="text-danger help-error" data-error="fechaNacimiento" th:errors="*{fechaNacimiento}"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="foto">Foto de perfil</label>
              <input id="foto" class="form-control" type="file" name="foto" accept="image/png,image/jpeg,image/webp">
              <div class="form-text">Formatos permitidos: JPG, PNG y WEBP. Máximo 2 MB.</div>
            </div>

            <div class="col-12" th:if="${contacto.fotoBase64 != null}">
              <label class="form-label d-block">Foto actual</label>
              <img class="preview" th:src="'data:image/*;base64,' + ${contacto.fotoBase64}" alt="Foto actual">
            </div>
          </div>

          <div class="actions">
            <a class="btn btn-outline-secondary" th:href="@{/Home/Lista}">Cancelar</a>
            <button id="btnGuardar" class="btn btn-dark" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('contactoForm');
      const statusBox = document.getElementById('statusBox');
      const btnGuardar = document.getElementById('btnGuardar');
      const fotoInput = document.getElementById('foto');
      const telefonoInput = document.getElementById('telefono');
      const cpInput = document.getElementById('cp');
      const fechaInput = document.getElementById('fechaNacimiento');

      if (!form) return;

      const cleanDigits = (input, max) => {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(0, max);
        });
      };

      cleanDigits(telefonoInput, 10);
      cleanDigits(cpInput, 5);

      if (fechaInput) {
        const today = new Date().toISOString().split('T')[0];
        fechaInput.max = today;
      }

      if (fotoInput) {
        fotoInput.addEventListener('change', () => {
          const file = fotoInput.files[0];
          if (!file) return;

          const allowed = ['image/jpeg', 'image/png', 'image/webp'];
          if (!allowed.includes(file.type)) {
            fotoInput.value = '';
            showStatus('Solo se permiten imágenes JPG, PNG o WEBP.', 'danger');
            return;
          }

          if (file.size > 2 * 1024 * 1024) {
            fotoInput.value = '';
            showStatus('La imagen no puede superar 2 MB.', 'danger');
          }
        });
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearErrors();
        hideStatus();

        if (!form.reportValidity()) return;

        const data = new FormData(form);
        btnGuardar.disabled = true;
        form.classList.add('loading');
        btnGuardar.textContent = 'Guardando...';

        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: data,
            headers: {
              'Accept': 'application/json',
              'X-Requested-With': 'XMLHttpRequest'
            }
          });

          const result = await response.json();

          if (!response.ok || !result.ok) {
            if (result.errores) {
              Object.entries(result.errores).forEach(([field, message]) => {
                const errorNode = document.querySelector(`[data-error="${field}"]`);
                if (errorNode) errorNode.textContent = message;
              });
            }
            showStatus(result.mensaje || 'No fue posible guardar el contacto.', 'danger');
            return;
          }

          showStatus(result.mensaje || 'Guardado correctamente.', 'success');
          window.location.href = result.redirectUrl || '/Home/Lista';
        } catch (error) {
          showStatus('Error de conexión. Verifica el servidor e inténtalo de nuevo.', 'danger');
        } finally {
          btnGuardar.disabled = false;
          form.classList.remove('loading');
          btnGuardar.textContent = 'Guardar';
        }
      });

      function clearErrors() {
        document.querySelectorAll('[data-error]').forEach(node => node.textContent = '');
      }

      function showStatus(message, type) {
        statusBox.className = `alert alert-${type} status-box show`;
        statusBox.textContent = message;
      }

      function hideStatus() {
        statusBox.className = 'alert status-box';
        statusBox.textContent = '';
      }
    })();
  </script>
</body>
</html>
