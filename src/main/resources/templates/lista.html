<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Contactos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f8fafc; }
    .shell{ max-width:1100px; margin:40px auto; padding:0 15px; }
    .panel{ background:#fff; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.05); }
    .panel-header{ padding:20px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; }
    .panel-body{ padding:20px; }
    .panel-footer{ padding:15px 20px; border-top:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .avatar{ width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .meta{ font-size:.9rem; color:#64748b; }
  </style>
</head>

<body>
<div class="shell">

  <div class="panel">

    <!-- HEADER -->
    <div class="panel-header">
      <div>
        <h5 class="mb-0">Lista de contactos</h5>
        <small class="text-muted">Filtra, revisa y administra tus registros.</small>
      </div>
      <a class="btn btn-dark" th:href="@{/Home/Formulario}">Nuevo contacto</a>
    </div>

    <div class="panel-body">

      <!-- FILTROS -->
      <form class="row g-2 mb-3" th:action="@{/Home/Lista}" method="get">

        <input type="hidden" name="size" th:value="${size}"/>

        <div class="col-md-3">
          <input class="form-control" name="nombre" th:value="${nombre}" placeholder="Nombre">
        </div>

        <div class="col-md-3">
          <input class="form-control" name="correo" th:value="${correo}" placeholder="Correo">
        </div>

        <div class="col-md-2">
          <input class="form-control" name="telefono" th:value="${telefono}" placeholder="Teléfono">
        </div>

        <div class="col-md-2">
          <input class="form-control" name="cp" th:value="${cp}" placeholder="C.P.">
        </div>

        <div class="col-md-2">
          <input class="form-control" type="date" name="fecha" th:value="${fecha}">
        </div>

        <div class="col-12 mt-2">
          <button class="btn btn-dark">Buscar</button>
          <a class="btn btn-outline-secondary" th:href="@{/Home/Lista(size=${size})}">Limpiar</a>
        </div>
      </form>

      <!-- TABLA -->
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
          <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>C.P.</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
          </thead>

          <tbody>

          <!-- SIN DATOS -->
          <tr th:if="${contactos.totalElements == 0}">
            <td colspan="8" class="text-center py-4 text-muted">
              No hay contactos registrados.
            </td>
          </tr>

          <!-- CON DATOS -->
          <tr th:each="c : ${contactos.content}">
            <td>
              <img th:if="${c.fotoBase64 != null}"
                   th:src="'data:image/*;base64,' + ${c.fotoBase64}"
                   class="avatar"/>
              <span th:if="${c.fotoBase64 == null}" class="text-muted">—</span>
            </td>

            <td th:text="${c.nombre}"></td>
            <td th:text="${c.apellidos}"></td>
            <td th:text="${c.correo}"></td>
            <td th:text="${c.telefono}"></td>
            <td th:text="${c.cp}"></td>
            <td th:text="${c.fechaNacimiento}"></td>

            <td>
              <a class="btn btn-sm btn-outline-dark"
                 th:href="@{/Home/Formulario/{id}(id=${c.id})}">
                Editar
              </a>

              <form th:action="@{/Home/Eliminar/{id}(id=${c.id})}"
                    method="post"
                    style="display:inline;"
                    onsubmit="return confirm('¿Seguro que deseas eliminar este contacto?');">
                <button class="btn btn-sm btn-outline-danger">Eliminar</button>
              </form>
            </td>
          </tr>

          </tbody>
        </table>
      </div>

    </div>

    <!-- PAGINACIÓN -->
    <div class="panel-footer">

      <div class="meta">
        Total: <span th:text="${contactos.totalElements}"></span>
        | Página <span th:text="${contactos.number + 1}"></span>
        de <span th:text="${contactos.totalPages}"></span>
      </div>

      <nav th:if="${contactos.totalPages > 1}">
        <ul class="pagination mb-0">

          <!-- PRIMERO -->
          <li class="page-item" th:classappend="${contactos.first} ? 'disabled'">
            <a class="page-link"
               th:href="@{/Home/Lista(page=0,size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">
              «
            </a>
          </li>

          <!-- ANTERIOR -->
          <li class="page-item" th:classappend="${contactos.first} ? 'disabled'">
            <a class="page-link"
               th:href="@{/Home/Lista(page=${contactos.number - 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">
              ‹
            </a>
          </li>

          <!-- NÚMEROS -->
          <li class="page-item"
              th:each="i : ${#numbers.sequence(0, contactos.totalPages - 1)}"
              th:classappend="${i == contactos.number} ? 'active'">

            <a class="page-link"
               th:text="${i + 1}"
               th:href="@{/Home/Lista(page=${i},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">
            </a>
          </li>

          <!-- SIGUIENTE -->
          <li class="page-item" th:classappend="${contactos.last} ? 'disabled'">
            <a class="page-link"
               th:href="@{/Home/Lista(page=${contactos.number + 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">
              ›
            </a>
          </li>

          <!-- ÚLTIMO -->
          <li class="page-item" th:classappend="${contactos.last} ? 'disabled'">
            <a class="page-link"
               th:href="@{/Home/Lista(page=${contactos.totalPages - 1},size=${size},nombre=${nombre},correo=${correo},telefono=${telefono},cp=${cp},fecha=${fecha})}">
              »
            </a>
          </li>

        </ul>
      </nav>

    </div>

  </div>

</div>
</body>
</html>
